<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#0d0d1a" rx="16"/>
  <!-- 손바닥 (아래 부분) -->
  <rect x="60" y="118" width="80" height="58" rx="18" fill="#d4a574"/>
  <!-- 검지 (V의 왼쪽) -->
  <rect x="64" y="45" width="18" height="78" rx="9" fill="#d4a574"/>
  <!-- 중지 (V의 오른쪽) -->
  <rect x="86" y="36" width="18" height="87" rx="9" fill="#d4a574"/>
  <!-- 약지 (굽힘) -->
  <path d="M108 118 Q115 95 118 118" fill="#d4a574" stroke="none"/>
  <rect x="108" y="118" width="18" height="18" rx="5" fill="#d4a574"/>
  <!-- 새끼 (굽힘) -->
  <path d="M128 118 Q133 100 136 118" fill="#d4a574" stroke="none"/>
  <rect x="128" y="118" width="14" height="14" rx="5" fill="#d4a574"/>
  <!-- 엄지 (굽힘) -->
  <ellipse cx="48" cy="128" rx="14" ry="16" fill="#d4a574"/>
  <!-- V 강조선 -->
  <line x1="72" y1="44" x2="95" y2="44" stroke="#00e5a0" stroke-width="2" opacity="0.6" stroke-dasharray="3,3"/>
</svg>
