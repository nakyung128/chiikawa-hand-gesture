<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#0d0d1a" rx="16"/>
  <!-- 손바닥 -->
  <rect x="58" y="110" width="84" height="62" rx="18" fill="#d4a574"/>
  <!-- 굽힌 손가락 윗면 -->
  <rect x="78" y="110" width="54" height="20" rx="10" fill="#c8956a"/>
  <!-- 엄지 (약간 옆으로) -->
  <ellipse cx="52" cy="122" rx="16" ry="13" fill="#d4a574"/>
  <!-- 검지 (위로) -->
  <rect x="64" y="42" width="20" height="74" rx="10" fill="#d4a574"/>
  <!-- 검지 끝 -->
  <ellipse cx="74" cy="45" rx="10" ry="8" fill="#e0b890"/>
  <!-- 새끼 (위로) -->
  <rect x="124" y="56" width="18" height="60" rx="9" fill="#d4a574"/>
  <!-- 새끼 끝 -->
  <ellipse cx="133" cy="59" rx="9" ry="7" fill="#e0b890"/>
  <!-- 마디선 (중지/약지 굽힘) -->
  <line x1="90" y1="111" x2="90" y2="130" stroke="#b8855a" stroke-width="1.5" opacity="0.6"/>
  <line x1="110" y1="111" x2="110" y2="130" stroke="#b8855a" stroke-width="1.5" opacity="0.6"/>
</svg>
